services:
  postgres:
    image: postgres:16-alpine
    container_name: bizflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bizflow
      POSTGRES_PASSWORD: bizflow123
      POSTGRES_DB: bizflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizflow -d bizflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
